    function Input({ label, value, onChange, textarea, required }) {
      const base = { width:"100%", boxSizing:"border-box", border:`1.5px solid ${iceBlue}`, borderRadius:8, padding:"8px 11px", fontSize:13, color:gray1, fontFamily:"system-ui,sans-serif", outline:"none", background:white, resize: textarea ? "vertical" : undefined };
      return (
        <div style={{ marginBottom:12 }}>
          <label style={{ fontSize:11, fontWeight:700, color:blueGray, textTransform:"uppercase", letterSpacing:"0.6px", display:"block", marginBottom:4 }}>
            {label}{required && <span style={{ color:orange }}> *</span>}
          </label>
          {textarea
            ? <textarea value={value} onChange={onChange} rows={3} style={base} />
            : <input value={value} onChange={onChange} style={base} />}
        </div>
      );
    }

    function Select({ label, value, onChange, options }) {
      return (
        <div style={{ marginBottom:12 }}>
          <label style={{ fontSize:11, fontWeight:700, color:blueGray, textTransform:"uppercase", letterSpacing:"0.6px", display:"block", marginBottom:4 }}>{label}</label>
          <select value={value} onChange={onChange} style={{ width:"100%", border:`1.5px solid ${iceBlue}`, borderRadius:8, padding:"8px 11px", fontSize:13, color:gray1, background:white, outline:"none" }}>
            {options.map(o => <option key={o}>{o}</option>)}
          </select>
        </div>
      );
    }

          <span style={{ width:6, height:6, borderRadius:"50%", background:m.dot, flexShrink:0 }} />
          {s}
        </span>
      );
    }

    function EditForm({ item, onSave, onCancel }) {
      const [form, setForm] = useState({ ...item });
      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
      const valid = form.title.trim() && form.owner.trim() && form.current.trim();
      return (
        <div style={{ padding:"20px 26px 26px" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 16px" }}>
            <div style={{ gridColumn:"1/-1" }}>
              <Input label="Título" value={form.title} onChange={set("title")} required />
            </div>
            <Select label="Categoria" value={form.cat} onChange={set("cat")} options={CATS} />
            <Select label="Status" value={form.status} onChange={set("status")} options={STATUSES} />
            <Input label="Responsável" value={form.owner} onChange={set("owner")} required />
            <Input label="Prazo" value={form.deadline} onChange={set("deadline")} />
          </div>
          <Input label="Situação Atual" value={form.current} onChange={set("current")} textarea required />
          <Input label="Próximos Passos" value={form.next} onChange={set("next")} textarea />
          <Input label="Comentários" value={form.comments} onChange={set("comments")} textarea />
          <div style={{ display:"flex", gap:10, marginTop:8 }}>
            <button onClick={onCancel} style={{ flex:1, padding:"10px", borderRadius:8, fontSize:13, fontWeight:600, background:lightIce, color:gray2, border:`1px solid ${iceBlue}`, cursor:"pointer" }}>Cancelar</button>
            <button onClick={() => valid && onSave(form)} style={{ flex:2, padding:"10px", borderRadius:8, fontSize:13, fontWeight:600, background: valid ? teal : iceBlue, color:white, border:"none", cursor: valid ? "pointer" : "not-allowed", transition:"background .15s" }}>Salvar</button>
          </div>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(initialData);
      const [loaded, setLoaded] = useState(false);
      const [cat, setCat] = useState("Todas");
      const [st, setSt] = useState("Todos");
      const [q, setQ] = useState("");
      const [sel, setSel] = useState(null);
      const [editItem, setEditItem] = useState(null);
      const [confirmDel, setConfirmDel] = useState(null);

      useEffect(() => {
        try { const saved = localStorage.getItem("solubio-data-v2"); if (saved) setData(JSON.parse(saved)); } catch(_) {}
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        localStorage.setItem("solubio-data-v2", JSON.stringify(data));
      }, [data, loaded]);

      const filtered = data.filter(d => {
        const mc = cat === "Todas" || d.cat === cat;
        const ms = st === "Todos" || d.status === st;
        const mq = !q.trim() || [d.title, d.owner, d.current].join(" ").toLowerCase().includes(q.toLowerCase());
        return mc && ms && mq;
      });

      const counts = {
        total: data.length,
        andamento: data.filter(d => d.status === "Em andamento").length,
        concluido: data.filter(d => d.status === "Concluído").length,
        onhold: data.filter(d => d.status === "On Hold").length,
      };

      function openNew() { setEditItem({ ...emptyForm, id:`NEW-${Date.now()}` }); }
      function openEdit(item, e) { e.stopPropagation(); setSel(null); setEditItem({ ...item }); }
      function saveItem(form) {
        setData(prev => {
          const exists = prev.find(d => d.id === form.id);
          if (exists) return prev.map(d => d.id === form.id ? form : d);
          return [...prev, form];
        });
        setEditItem(null);
      }
      function deleteItem(id) { setData(prev => prev.filter(d => d.id !== id)); setConfirmDel(null); setSel(null); }

      return (
        <div style={{ background:lightIce, minHeight:"100vh", fontFamily:"system-ui,-apple-system,sans-serif" }}>

          {/* HEADER */}
          <div style={{ background:teal, padding:"26px 32px 22px" }}>
            <div style={{ maxWidth:1080, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:20 }}>
              <div>
                <p style={{ color:"rgba(170,190,200,0.7)", fontSize:11, letterSpacing:"1.4px", textTransform:"uppercase", margin:"0 0 6px", fontWeight:500 }}>· 23 Mar 2026 ·</p>
                <h1 style={{ color:white, fontSize:24, fontWeight:700, margin:0, letterSpacing:"-0.4px" }}>
                  Solubio <span style={{ color:iceBlue, fontWeight:300 }}>Weekly Update</span>
                </h1>
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                {[
                  { n:counts.total, label:"Total" },
                  { n:counts.andamento, label:"Em andamento" },
                  { n:counts.concluido, label:"Concluídos" },
                  { n:counts.onhold, label:"On Hold" },
                ].map((k,i) => (
                  <div key={i} style={{ background:"rgba(255,255,255,.06)", border:"1px solid rgba(170,190,200,.15)", borderRadius:10, padding:"8px 18px", textAlign:"center", minWidth:72 }}>
                    <div style={{ fontSize:22, fontWeight:700, color:white, lineHeight:1 }}>{k.n}</div>
                    <div style={{ fontSize:10, color:"rgba(170,190,200,0.6)", marginTop:3, whiteSpace:"nowrap" }}>{k.label}</div>
                  </div>
                ))}
                <button onClick={openNew} style={{ marginLeft:8, background:white, border:"none", borderRadius:10, padding:"10px 20px", fontSize:13, fontWeight:600, color:teal, cursor:"pointer", display:"flex", alignItems:"center", gap:6, boxShadow:"0 2px 8px rgba(0,0,0,.15)" }}>
                  + Novo item
                </button>
              </div>
            </div>
          </div>

          {/* TABS */}
          <div style={{ background:white, borderBottom:`1px solid ${iceBlue}`, overflowX:"auto" }}>
            <div style={{ maxWidth:1080, margin:"0 auto", padding:"0 32px", display:"flex" }}>
              {catTabs.map(c => (
                <button key={c} onClick={() => setCat(c)} style={{ padding:"13px 16px", fontSize:12, fontWeight: cat===c ? 600 : 400, color: cat===c ? teal : gray3, background:"none", border:"none", borderBottom: cat===c ? `2.5px solid ${teal}` : "2.5px solid transparent", cursor:"pointer", whiteSpace:"nowrap", transition:"all .15s" }}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {/* FILTERS */}
          <div style={{ maxWidth:1080, margin:"0 auto", padding:"20px 32px 0", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
            <div style={{ display:"flex", gap:8 }}>
              {statusFilters.map(s => {
                const active = st === s;
                const m = s !== "Todos" ? getSM(s) : null;
                return (
                  <button key={s} onClick={() => setSt(s)} style={{ padding:"8px 18px", borderRadius:24, fontSize:12, fontWeight:600, cursor:"pointer", background: active ? (m ? m.dot : teal) : white, color: active ? white : gray2, border: active ? "1.5px solid transparent" : `1.5px solid ${iceBlue}`, boxShadow: active ? "0 2px 8px rgba(0,0,0,.15)" : "none", transition:"all .15s" }}>
                    {s}
                  </button>
                );
              })}
            </div>
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Buscar…" style={{ paddingLeft:14, paddingRight:14, paddingTop:8, paddingBottom:8, border:`1.5px solid ${iceBlue}`, borderRadius:24, fontSize:12, color:gray1, outline:"none", width:200, background:white }} />
          </div>

          {/* GRID */}
          <div style={{ maxWidth:1080, margin:"0 auto", padding:"16px 32px 40px" }}>
            <p style={{ fontSize:11, color:gray3, marginBottom:16 }}>{filtered.length} itens</p>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))", gap:14 }}>
              {filtered.map(item => (
                <div key={item.id} onClick={() => setSel(item)}
                  style={{ background:white, borderRadius:10, cursor:"pointer", border:`1px solid ${iceBlue}`, borderLeft:`4px solid ${teal}`, transition:"box-shadow .15s", display:"flex", flexDirection:"column" }}
                  onMouseEnter={e => e.currentTarget.style.boxShadow="0 6px 20px rgba(0,61,76,.10)"}
                  onMouseLeave={e => e.currentTarget.style.boxShadow="none"}
                >
                  <div style={{ padding:"16px 18px 12px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                      <span style={{ fontSize:10, fontWeight:700, color:teal, textTransform:"uppercase", letterSpacing:"0.5px" }}>{item.cat}</span>
                      <StatusPill s={item.status} />
                    </div>
                    <h3 style={{ fontSize:14, fontWeight:700, color:gray1, margin:"0 0 8px", lineHeight:1.4 }}>{item.title}</h3>
                    <p style={{ fontSize:12, color:gray2, lineHeight:1.65, margin:0, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden" }}>{item.current}</p>
                  </div>
                  {item.next && (
                    <div style={{ margin:"0 18px 12px", borderRadius:7, padding:"8px 12px", background:lightIce, borderLeft:`3px solid ${iceBlue}` }}>
                      <p style={{ fontSize:10, fontWeight:700, color:blueGray, textTransform:"uppercase", letterSpacing:"0.5px", margin:"0 0 2px" }}>Next step</p>
                      <p style={{ fontSize:11, color:gray2, margin:0, lineHeight:1.5, display:"-webkit-box", WebkitLineClamp:1, WebkitBoxOrient:"vertical", overflow:"hidden" }}>{item.next}</p>
                    </div>
                  )}
                  <div style={{ marginTop:"auto", padding:"10px 18px 13px", display:"flex", justifyContent:"space-between", alignItems:"center", borderTop:`1px solid ${lightIce}` }}>
                    <span style={{ fontSize:11, color:blueGray }}>{item.owner}</span>
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      <span style={{ fontSize:10, fontWeight:600, padding:"3px 9px", borderRadius:6, background:lightIce, color:blueGray, border:`1px solid ${iceBlue}` }}>{item.deadline}</span>
                      <button onClick={e => openEdit(item, e)} style={{ background:"none", border:`1px solid ${iceBlue}`, borderRadius:6, padding:"3px 9px", fontSize:11, color:blueGray, cursor:"pointer" }}>Editar</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            {filtered.length === 0 && (
              <div style={{ textAlign:"center", padding:"80px 0", color:blueGray }}>
                <p style={{ fontSize:14 }}>Nenhum item encontrado.</p>
              </div>
            )}
          </div>

          {/* VIEW MODAL */}
          {sel && !editItem && (
            <div onClick={() => setSel(null)} style={{ position:"fixed", inset:0, background:"rgba(0,20,28,.5)", zIndex:50, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <div onClick={e => e.stopPropagation()} style={{ background:white, borderRadius:14, width:"100%", maxWidth:540, maxHeight:"88vh", overflowY:"auto", boxShadow:"0 24px 60px rgba(0,30,40,.25)", borderTop:`4px solid ${teal}` }}>
                <div style={{ padding:"22px 26px 18px", borderBottom:`1px solid ${lightIce}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div style={{ flex:1, paddingRight:12 }}>
                      <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8 }}>
                        <span style={{ fontSize:10, color:teal, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px" }}>{sel.cat}</span>
                        <span style={{ fontSize:10, color:gray3, fontFamily:"monospace" }}>#{sel.id}</span>
                        <StatusPill s={sel.status} />
                      </div>
                      <h2 style={{ fontSize:18, fontWeight:700, color:teal, margin:0, lineHeight:1.3 }}>{sel.title}</h2>
                    </div>
                    <button onClick={() => setSel(null)} style={{ background:lightIce, border:"none", color:gray3, width:30, height:30, borderRadius:"50%", cursor:"pointer", fontSize:15, flexShrink:0 }}>✕</button>
                  </div>
                  <div style={{ display:"flex", gap:16, marginTop:14, alignItems:"center" }}>
                    <span style={{ fontSize:12, color:blueGray }}>Responsável: <b>{sel.owner}</b></span>
                    <div style={{ height:14, width:1, background:iceBlue }} />
                    <span style={{ fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:6, background:lightIce, color:blueGray, border:`1px solid ${iceBlue}` }}>{sel.deadline}</span>
                  </div>
                </div>
                <div style={{ padding:"20px 26px" }}>
                  {[
                    { label:"Situação Atual", text:sel.current, bg:lightIce, border:iceBlue, color:teal },
                    sel.next    ? { label:"Próximos Passos", text:sel.next,     bg:lightIce, border:iceBlue, color:blueGray } : null,
                    sel.comments? { label:"Comentários",     text:sel.comments, bg:lightIce, border:iceBlue, color:blueGray } : null,
                  ].filter(Boolean).map((s,i) => (
                    <div key={i} style={{ marginBottom:14 }}>
                      <p style={{ fontSize:11, fontWeight:700, color:s.color, textTransform:"uppercase", letterSpacing:"0.8px", margin:"0 0 7px" }}>{s.label}</p>
                      <div style={{ background:s.bg, border:`1px solid ${s.border}`, borderRadius:10, padding:"12px 15px", fontSize:13, color:gray1, lineHeight:1.75, whiteSpace:"pre-line" }}>{s.text}</div>
                    </div>
                  ))}
                  <div style={{ display:"flex", gap:10, marginTop:20 }}>
                    <button onClick={e => openEdit(sel, e)} style={{ flex:1, padding:"10px", borderRadius:8, fontSize:13, fontWeight:600, background:teal, color:white, border:"none", cursor:"pointer" }}>Editar item</button>
                    <button onClick={() => setConfirmDel(sel.id)} style={{ padding:"10px 18px", borderRadius:8, fontSize:13, fontWeight:600, background:"none", color:"#A02B1A", border:"1.5px solid #F4A99A", cursor:"pointer" }}>Excluir</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* EDIT / CREATE MODAL */}
          {editItem && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,20,28,.5)", zIndex:60, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <div style={{ background:white, borderRadius:14, width:"100%", maxWidth:520, maxHeight:"92vh", overflowY:"auto", boxShadow:"0 24px 60px rgba(0,30,40,.28)", borderTop:`4px solid ${teal}` }}>
                <div style={{ padding:"20px 26px 16px", borderBottom:`1px solid ${lightIce}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <h2 style={{ fontSize:17, fontWeight:700, color:teal, margin:0 }}>{editItem.id.startsWith("NEW") ? "Novo item" : "Editar item"}</h2>
                  <button onClick={() => setEditItem(null)} style={{ background:lightIce, border:"none", color:gray3, width:30, height:30, borderRadius:"50%", cursor:"pointer", fontSize:15 }}>✕</button>
                </div>
                <EditForm key={editItem.id} item={editItem} onSave={saveItem} onCancel={() => setEditItem(null)} />
              </div>
            </div>
          )}

          {/* DELETE CONFIRM */}
          {confirmDel && (
            <div onClick={() => setConfirmDel(null)} style={{ position:"fixed", inset:0, background:"rgba(0,20,28,.55)", zIndex:70, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <div onClick={e => e.stopPropagation()} style={{ background:white, borderRadius:14, padding:"28px 32px", maxWidth:380, width:"100%", boxShadow:"0 16px 48px rgba(0,30,40,.25)", textAlign:"center" }}>
                <div style={{ fontSize:32, marginBottom:12 }}>⚠️</div>
                <h3 style={{ color:gray1, margin:"0 0 8px", fontSize:16 }}>Excluir item?</h3>
                <p style={{ color:gray2, fontSize:13, margin:"0 0 24px", lineHeight:1.6 }}>Essa ação não poderá ser desfeita.</p>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => setConfirmDel(null)} style={{ flex:1, padding:"10px", borderRadius:8, fontSize:13, fontWeight:600, background:lightIce, color:gray2, border:`1px solid ${iceBlue}`, cursor:"pointer" }}>Cancelar</button>
                  <button onClick={() => deleteItem(confirmDel)} style={{ flex:1, padding:"10px", borderRadius:8, fontSize:13, fontWeight:600, background:"#A02B1A", color:white, border:"none", cursor:"pointer" }}>Excluir</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
